

trigger:
- main

pool: Agent ka pool

stages:
  - stage: inittoplan
    displayName: init to plan job
    jobs:
      - job: inittoplan
        displayName: init to plan
        steps:
        - task: TerraformInstaller@1
          inputs:
            terraformVersion: 'latest'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            backendServiceArm: 'nimacervice'
            backendAzureRmStorageAccountName: 'storagepipe123'
            backendAzureRmContainerName: 'tfstate'
            backendAzureRmKey: 'terraform.tfvars'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'validate'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'custom'
            outputTo: 'console'
            customCommand: 'fmt'
            environmentServiceNameAzureRM: 'nimacervice'
        - task: tfsec@1
          inputs:
            version: 'v1.26.0'
            dir: '$(System.DefaultWorkingDirectory)'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'plan'
            environmentServiceNameAzureRM: 'nimacervice'
      