trigger: none
pool: Agent ka pool
stages:
  - stage: init to plan
    jobs:
      - job: inittiplan
        displayName: init to plan job
        steps:
        - task: TerraformInstaller@1
          inputs:
            terraformVersion: 'latest'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            backendServiceArm: 'nimacervice'
            backendAzureRmStorageAccountName: 'storagepipe123'
            backendAzureRmContainerName: 'tfstate'
            backendAzureRmKey: 'terraform.tfvars'
        - task: tfsec@1
          inputs:
            version: 'v1.26.0'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'validate'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'custom'
            outputTo: 'console'
            customCommand: 'fmt'
            environmentServiceNameAzureRM: 'nimacervice'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'plan'
            environmentServiceNameAzureRM: 'nimacervice'
          