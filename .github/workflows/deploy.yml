name: Create infra

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  create-rg:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{secrets.b740c6eb-0a30-40c8-b771-a3733ffb6b4d}}
          tenant-id: ${{secrets.bd88f23d-779e-488f-9244-8bf40de66df8}}
          subscription-id: ${{secrets.d1476fd3-8c8b-4998-b422-9d32bce30508}}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
